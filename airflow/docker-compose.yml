# ============================================================
# Local Airflow — YouTube Analytics Pipeline
# LocalExecutor + AWS provider
# Run: docker compose up -d
# UI:  http://localhost:8080  (admin / see AIRFLOW_ADMIN_PASSWORD in .env)
# ============================================================

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'

    # AWS credentials — pulled from your .env file
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

    # Pipeline config — passed through to DAG via env vars
    YOUTUBE_BRONZE_BUCKET: ${YOUTUBE_BRONZE_BUCKET}
    YOUTUBE_GLUE_DB: youtube_analytics_dev
    YOUTUBE_DBT_PROJECT_DIR: ${YOUTUBE_DBT_PROJECT_DIR}
    YOUTUBE_DBT_PROFILES_DIR: ${YOUTUBE_DBT_PROFILES_DIR}

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # Mount your dbt project so the BashOperator can run dbt commands
    - ${YOUTUBE_DBT_PROJECT_DIR}:/opt/dbt/youtube_analytics
    - ${YOUTUBE_DBT_PROFILES_DIR}:/home/airflow/.dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  postgres-db-volume: